version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: locksmith
    binary: locksmith
    main: ./
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: default
    builds:
      - locksmith
    name_template: >-
      {{ .Binary }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: git

release:
  github:
    owner: emartai
    name: locksmith

brews:
  - name: locksmith
    repository:
      owner: emartai
      name: homebrew-locksmith
    description: Prevent dangerous Postgres migrations before they hit production
    license: MIT
    install: |
      bin.install "locksmith"
    test: |
      system "#{bin}/locksmith --version"
